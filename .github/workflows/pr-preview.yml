# Regenerate HTML outputs when source files change, and publish branch previews
# -------------------------------------------------------------------------
# Repo layout (repo root):
# - taxonomy-structure.mmd                                               (source — developer)
# - content/questions.csv                                                (source — content editor)
# - content/options.csv                                                  (source — content editor)
# - content/classifications.csv                                          (source — content editor)
# - weapons-classification-flowchart.mmd                                 (generated from above)
# - classification-guide.html                                            (generated output #1)
# - classification-guide-hypothesis-filtering.html                       (generated output #2)
#
# Goals:
# 1) Any time source files change on ANY branch:
#    - regenerate weapons-classification-flowchart.mmd via build_content_mmd.py
#    - regenerate classification-guide.html via mermaid_to_clickthrough.py
#    - regenerate classification-guide-hypothesis-filtering.html via csv_to_hypothesis_filtering.py
#    - commit the regenerated files back to that SAME branch
# 2) For non-gh-pages branches:
#    - also publish a branch preview to gh-pages under:
#        branch-preview/<branch-name>/
# 3) For gh-pages itself:
#    - do NOT publish a preview folder
#    - just keep the source + generated HTML side-by-side at the root

name: Branch Preview

on:
  push:
    paths:
      - "taxonomy-structure.mmd"
      - "content/questions.csv"
      - "content/options.csv"
      - "content/classifications.csv"
      - "src/build_content_mmd.py"
      - "src/mermaid_to_clickthrough.py"
      - "src/csv_to_hypothesis_filtering.py"
      - ".github/workflows/pr-preview.yml"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: branch-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pr-status:
    runs-on: ubuntu-latest
    # Extra loop guard: if the actor is GitHub Actions (from our own commit), don't run.
    if: ${{ github.actor != 'github-actions[bot]' }}
    outputs:
      is_draft: ${{ steps.check.outputs.is_draft }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_DRAFT=$(gh pr view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json isDraft -q '.isDraft' 2>/dev/null || echo "false")
          echo "is_draft=$IS_DRAFT" >> $GITHUB_OUTPUT

  build-commit-and-maybe-publish-preview:
    needs: check-pr-status
    runs-on: ubuntu-latest
    if: ${{ needs.check-pr-status.outputs.is_draft != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate weapons-classification-flowchart.mmd from structure + CSVs
        run: |
          python3 src/build_content_mmd.py \
            --structure taxonomy-structure.mmd \
            --questions content/questions.csv \
            --options content/options.csv \
            --classifications content/classifications.csv \
            --output weapons-classification-flowchart.mmd

      - name: Regenerate classification-guide.html
        run: |
          python3 src/mermaid_to_clickthrough.py \
            --input-mmd weapons-classification-flowchart.mmd \
            --output-html classification-guide.html \
            --app-name "[DEMO] Weapons Classification Guide"

      - name: Regenerate classification-guide-hypothesis-filtering.html
        run: |
          python3 src/csv_to_hypothesis_filtering.py \
            --questions content/questions.csv \
            --options content/options.csv \
            --classifications content/classifications.csv \
            --output classification-guide-hypothesis-filtering.html \
            --app-name "[DEMO] Weapons Classification Guide (Hypothesis Filtering)"

      - name: Commit regenerated files back to the same branch
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add weapons-classification-flowchart.mmd \
                  classification-guide.html \
                  classification-guide-hypothesis-filtering.html

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git commit -m "Auto-regenerate Mermaid and HTML outputs [skip ci]"
          git push origin "HEAD:${BRANCH_NAME}"

      # Everything below is ONLY for preview branches (not gh-pages itself)
      - name: Prepare dist/ payload for branch preview publish
        if: ${{ github.ref_name != 'gh-pages' }}
        run: |
          mkdir -p dist
          cp classification-guide.html dist/classification-guide.html
          cp classification-guide-hypothesis-filtering.html dist/classification-guide-hypothesis-filtering.html
          touch dist/.nojekyll

      - name: Publish preview to gh-pages under branch-preview/<branch-name>/
        if: ${{ github.ref_name != 'gh-pages' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dist
          destination_dir: branch-preview/${{ github.ref_name }}
          enable_jekyll: false
          keep_files: true
