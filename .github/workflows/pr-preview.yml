# Build and deploy the Vite/React app
# ---------------------------------------------------------------
# Repo layout:
# - src/                         React source
# - src/imports/                 CSV data files
# - index.html                   Vite entry template
# - package.json / vite.config.ts
#
# Goals:
# 1) Any time source files change on ANY branch:
#    - npm ci && npx vite build (with correct --base for deployment path)
# 2) For the gh-pages branch:
#    - Deploy dist/ via actions/deploy-pages to production
#    - Production URL: https://paigemoody.github.io/weapons_classification_resources.github.io/
# 3) For non-gh-pages branches:
#    - Publish dist/ to branch-preview/<branch-name>/ on gh-pages via peaceiris
#    - Preview URL: https://paigemoody.github.io/weapons_classification_resources.github.io/branch-preview/<branch-name>/
#
# NOTE: For production deploys to work, GitHub Pages source must be set to
# "GitHub Actions" in repo Settings → Pages.

name: Branch Preview

on:
  push:
    paths:
      - "src/**"
      - "scripts/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "postcss.config.mjs"
      - ".github/workflows/pr-preview.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write       # peaceiris preview push to gh-pages
  pages: write          # actions/deploy-pages production deploy
  id-token: write       # actions/deploy-pages OIDC token
  pull-requests: read

concurrency:
  group: branch-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pr-status:
    runs-on: ubuntu-latest
    # Loop guard: don't re-run when the bot itself pushes (e.g. preview deploys)
    if: ${{ github.actor != 'github-actions[bot]' }}
    outputs:
      is_draft: ${{ steps.check.outputs.is_draft }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_DRAFT=$(gh pr view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json isDraft -q '.isDraft' 2>/dev/null || echo "false")
          echo "is_draft=$IS_DRAFT" >> $GITHUB_OUTPUT

  build-and-deploy:
    needs: check-pr-status
    runs-on: ubuntu-latest
    if: ${{ needs.check-pr-status.outputs.is_draft != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest CSV data from Google Sheets
        run: npm run fetch-data

      - name: Validate CSV data
        run: npm run validate-data

      # Build with base path matching the deployment location so asset URLs are correct

      - name: Build (production — gh-pages branch)
        if: ${{ github.ref_name == 'gh-pages' }}
        run: npx vite build --base=/weapons_classification_resources.github.io/

      - name: Build (preview — feature branch)
        if: ${{ github.ref_name != 'gh-pages' }}
        run: npx vite build --base=/weapons_classification_resources.github.io/branch-preview/${{ github.ref_name }}/

      # --- Production deploy (gh-pages branch only) ---

      - name: Upload Pages artifact
        if: ${{ github.ref_name == 'gh-pages' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        if: ${{ github.ref_name == 'gh-pages' }}
        id: deployment
        uses: actions/deploy-pages@v4

      # --- Preview deploy (all other branches) ---
      # Surgically write only branch-preview/<branch>/ on gh-pages.
      # Using plain git instead of peaceiris so nothing outside that
      # subdirectory is ever staged or committed.

      - name: Deploy preview to gh-pages
        if: ${{ github.ref_name != 'gh-pages' }}
        run: |
          # Save the build output before switching branches
          cp -r dist/ /tmp/preview-dist/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages
          git checkout gh-pages

          PREVIEW_PATH="branch-preview/${{ github.ref_name }}"
          rm -rf "$PREVIEW_PATH"
          mkdir -p "$PREVIEW_PATH"
          cp -r /tmp/preview-dist/. "$PREVIEW_PATH/"

          # Stage ONLY the preview subdirectory — nothing else
          git add "$PREVIEW_PATH"

          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Preview deploy: ${{ github.ref_name }}"
            # Retry push with rebase to handle concurrent branch deploys
            for i in 1 2 3; do
              git push origin gh-pages && break
              git pull --rebase origin gh-pages
            done
          fi
